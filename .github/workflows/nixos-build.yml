name: NixOS Build & Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  nixos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Show flake outputs
        run: nix flake show

      - name: Flake check
        run: nix flake check

      - name: Build NixOS system (y3n)
        run: nix build .#nixosConfigurations.y3n.config.system.build.toplevel --no-link

      - name: Build Home Manager config
        run: nix build .#homeConfigurations."nec@y3n".activationPackage --no-link
